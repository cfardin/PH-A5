<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link rel="stylesheet" href="style.css">

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- daisy ui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="">

    <!-- login card -->
    <section class="bg-white max-w-[520px] max-h-[743px] my-[74px] rounded-[8px] p-9 m-auto shadow-lg ">
        <div class="flex flex-col justify-center items-center text-center">
            <img class="w-[100px] h-[100px]" src="assets/github-logo.png" alt="GitHub_logo">
            <h3 class="text-[24px] font-semibold">GitHub Issues Tracker</h3>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <!-- login input -->
        <fieldset class="fieldset">
            <legend class="fieldset-legend font-semibold text-[16px]">Username</legend>
            <input id="username-input" type="text" class="input w-[100%]" placeholder="Enter Username" />
            <p class="text-[#4A00FF] text-[14px]">Default: admin</p>
            <legend class="fieldset-legend font-semibold text-[16px]">Password</legend>
            <input id="password-input" type="password" class="input w-[100%]" placeholder="Enter Password" />
            <p class="text-[#4A00FF] text-[14px]">Default: admin123</p>
        </fieldset>

        <button id="login-btn" class="btn btn-primary w-[100%] my-6">Sign In</button>

        <div class="flex items-center gap-2 mb-6">
            <div class="flex-1 h-px bg-gray-300"></div>
            <p>OR</p>
            <div class="flex-1 h-px bg-gray-300"></div>
        </div>



        <p class="text-center mb-2">Demo Credentials:</p>
        <div class="bg-[#F8FAFC] text-center py-6">
            <p><span>Username:</span> admin</p>
            <p><span>Password:</span> admin123</p>
        </div>

    </section>

  


    <script src="login.js"></script>
    <script src="app.js"></script>
</body>

</html>
