    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"

        crossorigin="anonymous" referrerpolicy="no-referrer" />

<body class="bg-gray-100">

    <header>
        <!-- navbar -->
        <div class="navbar bg-base-100 shadow-sm flex justify-between">
            <a class="btn btn-ghost text-xl">
                <img class="w-[36px]" src="assets/github-logo.png" alt="">
                <span>GitHub Issues Tracker</span>
            </a>

            <div class="join">
                <div>
                    <label class="input validator join-item">
                        <!-- search input -->
                        <input id="search-input" type="text" placeholder="Search issues..." />
                    </label>
                    <div class="validator-hint hidden">Enter valid email address</div>
                </div>
                <!-- search btn -->
                <button id="search-btn" class="btn btn-primary join-item">Search</button>
            </div>
        </div>
    </header>


    <!-- tab button section -->
    <section class="bg-white container m-auto p-6 mt-14 mb-4 rounded-lg shadow-md">
        <button onclick="loadIssues('all-btn')" id="all-btn"
            class="btn btn-outline btn-primary bg-primary text-white">All</button>
        <button onclick="loadIssues('open-btn')" id="open-btn" class="btn btn-outline btn-primary">Open</button>
        <button onclick="loadIssues('closed-btn')" id="closed-btn" class="btn btn-outline btn-primary">Closed</button>

    </section>

    <!-- issues section -->
    <section class="flex justify-between items-center bg-white container m-auto p-6 rounded-lg shadow-md">
        <!-- left -->
        <div class="flex items-center  gap-1">
            <img src="assets/Aperture.png" alt="">
            <div>
                <h3 class="text-[20px] font-semibold"><span id="issue_count">0</span> Issues</h3>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex gap-6">
            <p><span class="dot green"></span> Open</p>
            <p><span class="dot purple"></span> Closed</p>
        </div>
    </section>

    <div id="spinner" class="flex justify-center hidden">
        <span class="loading loading-dots loading-xl"></span>
    </div>

    <!-- issues -->
    <section id="issue-container" class="container m-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3 p-6">
        <!-- <div class="bg-white p-6 rounded-lg space-y-2 h-[100%] w-full">

    <!-- Open the modal using ID.showModal() method -->
    <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
